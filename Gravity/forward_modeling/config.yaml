# Gravity forward modeling config (GMESDataset/Gravity/forward_modeling/config.yaml)
simulation:
  device: cuda

model:
  # Density model path (relative paths are resolved relative to this config file)
  file_path: ../sample_code/density.npy    # <-- replace with your density model
  density_unit: kg/m^3                     # canonical gravity density unit
  shape: [256, 256, 256]                  # required for .bin or if file_path missing
  dx: 10.0
  dy: 10.0
  dz: 12.5
  default_density: 2670.0

gravity:
  heights_m: [0.0]          # observation height above surface (m)
  output_unit: mgal         # si / mgal / ugal
  pad_factor: 2
  G: 6.67430e-11

  observation:
    layout: grid
    n_x: 256
    n_y: 256
    first_x: 0
    first_y: 0
    d_x: 1
    d_y: 1

output:
  save_path: output/gravity_data.npz
